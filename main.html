<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="header">
    <h1>Color Board — 800 Squares — Hover to Activate</h1>
  </div>

  <div class="container" id="board"></div>

  <p class="footer">40 × 20</p>

  <script>
    const palettes = [
      ["#FF006E", "#FB5607", "#FFBE0B", "#8338EC", "#3A86FF"],
      ["#00F5FF", "#FF00FF", "#FFFF00", "#00FF88", "#FF4444"],
      ["#F72585", "#7209B7", "#3A0CA3", "#4361EE", "#4CC9F0"],
      ["#06D6A0", "#118AB2", "#FFD166", "#EF476F", "#073B4C"],
    ];

    function getRandomColor() {
      const palette = palettes[Math.floor(Math.random() * palettes.length)];
      return palette[Math.floor(Math.random() * palette.length)];
    }

    const board = document.getElementById("board");

    for (let i = 0; i < 800; i++) {
      const square = document.createElement("div");
      square.classList.add("square");

      square.addEventListener("mouseenter", () => {
        const color = getRandomColor();
        square.style.backgroundColor = color;
        square.style.boxShadow = `0 0 12px ${color}88, 0 0 4px ${color}`;
        square.style.transition = "background-color 0.05s ease, box-shadow 0.05s ease";
      });

      square.addEventListener("mouseleave", () => {
        square.style.transition = "background-color 1s ease-out, box-shadow 1s ease-out";
        square.style.backgroundColor = "transparent";
        square.style.boxShadow = "none";
      });

      board.appendChild(square);
    }
  </script>

</body>
</html>
